version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: strategy_vault
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: rigorous_validation
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
